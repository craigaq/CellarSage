name: Cellar Sage Weekly Price Sync (Thursday)

on:
  # Every Thursday at 02:00 UTC (Thursday 12:00 AEST / 11:30 ACST)
  schedule:
    - cron: "0 2 * * 4"

  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      merchant:
        description: 'Merchant to sync (leave blank for all)'
        required: false
        default: ''

jobs:
  sync:
    name: Scrape - Normalise - Upsert
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Assert branch is master
        run: |
          if [ "${{ github.ref }}" != "refs/heads/master" ]; then
            echo "ERROR: This workflow must run from master (got ${{ github.ref }})"
            exit 1
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/sync/requirements.txt

      - name: Run sync engine
        working-directory: backend
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
        run: python -m sync.main
