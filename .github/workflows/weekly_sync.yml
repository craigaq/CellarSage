name: Cellar Sage Weekly Price Sync (Thursday)

on:
  # Every Thursday at 02:00 UTC (Thursday 12:00 AEST / 11:30 ACST)
  schedule:
    - cron: "0 2 * * 4"

  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      merchant:
        description: 'Merchant to sync (leave blank for all)'
        required: false
        default: ''

jobs:
  sync:
    name: Scrape - Normalise - Upsert
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Assert branch is master
        run: |
          if [ "${{ github.ref }}" != "refs/heads/master" ]; then
            echo "ERROR: This workflow must run from master (got ${{ github.ref }})"
            exit 1
          fi

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Ensure latest master
        run: |
          git fetch origin master --depth=1
          git reset --hard FETCH_HEAD


      - name: Verify checkout
        run: |
          echo "=== Git SHA ==="
          git rev-parse HEAD
          echo "=== config.py pages/enabled ==="
          grep -E "(pages|enabled|portersliquor|bottleo|laithwaites)" backend/sync/config.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/sync/requirements.txt

      - name: Run sync engine
        working-directory: backend
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
        run: python -m sync.main

      - name: Fix country mis-classifications
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python sync/audit_countries.py --fix

      - name: Check for new producer state gaps
        id: gap_check
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set +e
          python -m sync.backfill_producer_state --new-only > /tmp/gap_report.txt 2>&1
          EXIT=$?
          cat /tmp/gap_report.txt
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT

      - name: Open issue for unresolved producers
        if: steps.gap_check.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/gap_report.txt', 'utf8');

            // Extract the deduplicated producer lines printed after the summary
            const lines = raw.split('\n');
            const startIdx = lines.findIndex(l => l.includes('Producers not yet'));
            const gapLines = startIdx >= 0
              ? lines.slice(startIdx + 1).filter(l => l.trim()).join('\n')
              : '(see workflow log for details)';

            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[Producer State] New wines need state mapping — ${today}`,
              body: [
                '## New producers need state mapping',
                '',
                'This week\'s scrape added Australian wines whose producer is not yet in',
                '`backend/sync/producer_state.json`. Without an entry, these wines will',
                'appear as **National Contender** instead of **The Local Hero**.',
                '',
                '**Fix:** add the producer(s) below to `producer_state.json` and push.',
                'The next sync will resolve them automatically.',
                '',
                '```',
                gapLines.trim(),
                '```',
                '',
                '_Auto-created by the weekly sync workflow. Close when resolved._',
              ].join('\n'),
            });
